# v3
[phases.setup]
nixPkgs = [
  "php84",
  "php84Extensions.pdo_mysql",
  "php84Extensions.mbstring",
  "php84Extensions.xml",
  "php84Extensions.curl",
  "php84Packages.composer",
  "nodejs_20"
]

[phases.install]
cmds = [
  "composer install --no-dev --ignore-platform-reqs",
  "npm install"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
