[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.xml", "php84Extensions.curl", "composer"]

[phases.build]
cmds = [
  "composer install --optimize-autoloader --no-dev --no-scripts"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
